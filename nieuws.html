<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dagelijks Nederlands Nieuws</title>
<style>
  /* Same look & feel as the daily email */
  body { font-family: Georgia, serif; line-height: 1.7; color: #333; max-width: 760px; margin: 0 auto; padding: 20px; background: #fafafa; }
  .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h1 { color: #1a5276; border-bottom: 3px solid #e67e22; padding-bottom: 10px; }
  h2 { color: #1a5276; margin-top: 30px; }
  h3 { margin: 12px 0 5px; }
  p { margin: 0 0 10px; }

  /* Navigation bar: prev/next arrows + date picker */
  .nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .nav button { background: #1a5276; color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 16px; cursor: pointer; }
  .nav button:hover { background: #e67e22; }
  .nav input[type="date"] { padding: 7px 10px; border: 1px solid #bbb; border-radius: 6px; font-family: inherit; font-size: 14px; }
  .nav .today-btn { background: #27ae60; }
  .meta { color: #7f8c8d; margin-top: -5px; }

  /* Video embed keeps 16:9 ratio on all screens */
  .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; border-radius: 8px; overflow: hidden; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
  .bron-tag { display: inline-block; background: #e67e22; color: white; font-size: 12px; font-weight: bold; padding: 2px 10px; border-radius: 12px; margin-bottom: 5px; }

  .level-a1 { background: #e8f8f5; border-left: 5px solid #27ae60; padding: 15px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .level-a2 { background: #ebf5fb; border-left: 5px solid #3498db; padding: 15px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .level-b1 { background: #fef9e7; border-left: 5px solid #f39c12; padding: 15px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .level-b2 { background: #fdedec; border-left: 5px solid #e74c3c; padding: 15px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .level-c1 { background: #f4ecf7; border-left: 5px solid #8e44ad; padding: 15px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .level-b1 strong { background: #fdebc8; padding: 0 3px; border-radius: 3px; }
  .level-b2 strong { background: #fadbd8; padding: 0 3px; border-radius: 3px; }
  .level-c1 strong { background: #e8daef; padding: 0 3px; border-radius: 3px; }

  table.vocab { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
  table.vocab td, table.vocab th { border: 1px solid #ddd; padding: 8px 10px; text-align: left; vertical-align: top; }
  table.vocab th { background: #1a5276; color: white; }
  table.vocab tr:nth-child(even) { background: #f7f9fb; }
  .afk { font-size: 12px; color: #7f8c8d; font-style: italic; margin-top: 6px; }

  .d-box { border-radius: 6px; padding: 8px 15px; margin-bottom: 10px; }
  .box-b1 { background: #fefaf0; border: 1px solid #f39c12; }
  .box-b2 { background: #fdf3f2; border: 1px solid #e74c3c; }
  .box-c1 { background: #f9f4fc; border: 1px solid #8e44ad; }
  .d-item { padding: 12px 0; border-bottom: 1px dashed #ccc; }
  .d-item:last-child { border-bottom: none; }
  .d-word { font-size: 16px; font-weight: bold; color: #2c3e50; }
  .d-tr { margin: 4px 0; color: #444; }
  .d-simple { font-size: 14px; margin: 3px 0; }
  .d-ex { font-size: 14px; margin: 6px 0 2px; color: #2c3e50; }
  .d-ex-tr { font-size: 13px; color: #777; margin-left: 18px; }
  .lvl { display: inline-block; background: #34495e; color: white; font-size: 11px; font-weight: bold; padding: 1px 6px; border-radius: 3px; margin-right: 3px; }

  /* Quick word glosses shown directly under a level box */
  .gloss { font-size: 13px; color: #666; background: rgba(255,255,255,0.6); border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 8px; line-height: 1.6; }

  .grammar { background: #fbfcfd; border: 1px solid #d5dbdb; border-radius: 6px; padding: 8px 18px; line-height: 1.8; }
  .g-head { font-weight: bold; color: #1a5276; margin: 16px 0 6px; font-size: 15px; }
  .g-note { margin: 4px 0; }
  .g-ex { background: #eef5fb; border-left: 3px solid #3498db; padding: 8px 12px; margin: 6px 0; border-radius: 0 4px 4px 0; font-size: 14px; }

  .questions { background: #fdfefe; border: 1px solid #bdc3c7; padding: 15px; border-radius: 6px; }
  /* Answers are hidden behind a click, so you can test yourself first */
  details.answers { background: #f8f9fa; border-radius: 6px; border-left: 5px solid #27ae60; margin-top: 10px; }
  details.answers summary { cursor: pointer; padding: 12px 15px; font-weight: bold; color: #1a5276; }
  details.answers .answer-body { padding: 0 15px 15px; }

  .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; color: #999; font-size: 12px; text-align: center; }
  .error { color: #c0392b; background: #fdedec; padding: 15px; border-radius: 6px; }

  /* ===== Quiz ===== */
  .quiz-box { background: #fbfcfd; border: 1px solid #d5dbdb; border-radius: 8px; padding: 15px 18px; }
  .quiz-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
  .quiz-tabs button { border: 1px solid #bbb; background: #fff; border-radius: 20px; padding: 6px 16px; cursor: pointer; font-family: inherit; font-size: 14px; }
  .quiz-tabs button.active { background: #1a5276; color: #fff; border-color: #1a5276; font-weight: bold; }
  .q-item { padding: 14px 0; border-bottom: 1px dashed #ccc; }
  .q-item:last-child { border-bottom: none; }
  .q-vraag { font-weight: bold; margin-bottom: 8px; }
  .q-opt { display: block; width: 100%; text-align: left; margin: 5px 0; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-family: inherit; font-size: 14px; }
  .q-opt:hover { background: #eef5fb; }
  .q-opt.correct { background: #e8f8f5; border-color: #27ae60; font-weight: bold; }
  .q-opt.wrong { background: #fdedec; border-color: #e74c3c; }
  .q-opt:disabled { cursor: default; }
  .q-uitleg { margin-top: 8px; font-size: 13px; color: #555; background: #fef9e7; border-left: 3px solid #f39c12; padding: 6px 10px; border-radius: 0 4px 4px 0; }
  .q-score { text-align: center; font-weight: bold; color: #1a5276; margin-top: 12px; font-size: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <button id="prevBtn" title="vorige">&#8592; vorige</button>
    <input type="date" id="datePicker">
    <button id="todayBtn" class="today-btn" title="vandaag">vandaag</button>
    <button id="nextBtn" title="volgende">volgende &#8594;</button>
  </div>
  <div id="content"><p>Laden...</p></div>
  <div class="footer"><p>&#127475;&#127473; Elke dag een stap dichter bij vloeiend Nederlands!</p></div>
</div>

<script>
// ===== Data loading =====
// The content lives in haberler.json in the same repo folder,
// so both this page and the daily email use one single source.
let DATA = null;          // full JSON (config + items)
let currentIndex = 0;     // which item is shown now

const AFKORTINGEN = "zn = zelfstandig naamwoord (isim) &nbsp;&bull;&nbsp; ww = werkwoord (fiil) &nbsp;&bull;&nbsp; bn = bijvoeglijk naamwoord (sıfat) &nbsp;&bull;&nbsp; bw = bijwoord (zarf) &nbsp;&bull;&nbsp; vz = voorzetsel (edat) &nbsp;&bull;&nbsp; uitdr = uitdrukking (deyim)";

async function loadData() {
  try {
    const resp = await fetch("haberler.json", { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    DATA = await resp.json();
    // Start on today's item (same day-cycle logic as the email script)
    currentIndex = indexForDate(new Date());
    render();
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<p class="error">Kon haberler.json niet laden: ' + e.message + "</p>";
  }
}

// ===== Day-cycle logic (identical to the Apps Script email) =====
// Days since start_date, modulo number of items -> today's index.
function indexForDate(date) {
  const start = new Date(DATA.config.start_date + "T00:00:00");
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayDiff = Math.round((d - start) / (1000 * 60 * 60 * 24));
  const n = DATA.items.length;
  return ((dayDiff % n) + n) % n;
}

// Reverse helper: when using prev/next we still show a matching date in the picker.
function dateForOffset(offsetDays) {
  const t = new Date();
  t.setDate(t.getDate() + offsetDays);
  return t;
}

// ===== Small render helpers (ported from the email script) =====
function nl2br(t) { return (t || "").toString().replace(/\n/g, "<br>"); }

function buildVocabTable(raw) {
  const lines = (raw || "").split("\n").filter(l => l.trim() !== "");
  if (!lines.length) return "";
  let rows = "";
  for (const line of lines) {
    const c = line.split("|").map(x => x.trim());
    while (c.length < 5) c.push("");
    rows += `<tr><td><strong>${c[0]}</strong></td>
      <td style="color:#8e44ad;font-style:italic;white-space:nowrap;">${c[1]}</td>
      <td>${c[2]}</td><td style="color:#555;">${c[3]}</td><td><strong>${c[4]}</strong></td></tr>`;
  }
  return `<h2>&#128218; Woordenschat</h2>
    <table class="vocab">
      <tr><th>Woord / Uitdrukking</th><th>Soort</th><th>Betekenis (NL)</th><th>Voorbeeld</th><th>T&uuml;rk&ccedil;e</th></tr>
      ${rows}</table>
    <p class="afk">${AFKORTINGEN}</p>`;
}

function buildDetailBox(raw, heading, boxClass, l1, l2) {
  const lines = (raw || "").split("\n").filter(l => l.trim() !== "");
  if (!lines.length) return "";
  let items = "";
  for (const line of lines) {
    const c = line.split("|").map(x => x.trim());
    while (c.length < 6) c.push("");
    let simpler = `<span class="lvl">${l1}</span> ${c[2]}`;
    if (c[3] && l2) simpler += ` &nbsp;<span class="lvl">${l2}</span> ${c[3]}`;
    items += `<div class="d-item">
      <span class="d-word">${c[0]}</span>
      <div class="d-tr">&#127481;&#127479; ${c[1]}</div>
      <div class="d-simple">&#128073; <em>makkelijker:</em> ${simpler}</div>
      <div class="d-ex">&#128221; <em>${c[4]}</em></div>
      <div class="d-ex-tr">&#8627; ${c[5]}</div></div>`;
  }
  return `${heading}<div class="d-box ${boxClass}">${items}</div>`;
}

function buildGrammar(raw) {
  let html = "";
  for (const line of (raw || "").split("\n")) {
    const t = line.trim();
    if (t === "") continue;
    if (/^\d+\)/.test(t)) html += `<p class="g-head">${t}</p>`;
    else if (t.startsWith("•")) html += `<div class="g-ex">${t.substring(1).trim()}</div>`;
    else html += `<p class="g-note">${t}</p>`;
  }
  return `<div class="grammar">${html}</div>`;
}

// Extract the YouTube video id so we can embed the player.
function youtubeId(url) {
  const m = (url || "").match(/(?:v=|youtu\.be\/|shorts\/)([\w-]{11})/);
  return m ? m[1] : null;
}

// Small word-gloss line under a level box (only if the item has one).
// item.gloss = { a1: "woord = anlam • woord = anlam", b2: "...", c1: "..." }
function glossLine(item, level) {
  const g = item.gloss && item.gloss[level];
  return g ? `<div class="gloss">&#128273; ${g}</div>` : "";
}

// ===== Main render =====
function render() {
  const item = DATA.items[currentIndex];
  const n = DATA.items.length;
  const vid = youtubeId(item.video_url);
  // Optional video_start (seconds): the embedded player starts at that point
  const startParam = item.video_start ? `?start=${item.video_start}` : "";
  const video = vid
    ? `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${vid}${startParam}" allowfullscreen title="${item.video_titel || ''}"></iframe></div>`
    : "";

  document.getElementById("content").innerHTML = `
    <h1>&#127475;&#127473; ${item.titel}</h1>
    <p class="meta">Nieuws ${currentIndex + 1}/${n} | Niveau A1 &rarr; C1</p>
    <span class="bron-tag">&#127909; ${item.bron || "video"}</span>
    ${video}
    <div class="level-a1"><h3>&#128994; A1</h3>${nl2br(item.a1)}${glossLine(item, "a1")}</div>
    <div class="level-a2"><h3>&#128309; A2</h3>${nl2br(item.a2)}${glossLine(item, "a2")}</div>
    <div class="level-b1"><h3>&#128993; B1</h3>${nl2br(item.b1)}${glossLine(item, "b1")}</div>
    <div class="level-b2"><h3>&#128992; B2</h3>${nl2br(item.b2)}${glossLine(item, "b2")}</div>
    <div class="level-c1"><h3>&#128308; C1</h3>${nl2br(item.c1)}${glossLine(item, "c1")}</div>
    ${buildVocabTable(item.woordenschat)}
    ${buildDetailBox(item.b1_woorden, "<h2>&#128993; B1 &mdash; Woorden onder de loep</h2>", "box-b1", "A2", "")}
    ${buildDetailBox(item.b2_woorden, "<h2>&#128992; B2 &mdash; Woorden onder de loep</h2>", "box-b2", "B1", "A2")}
    ${buildDetailBox(item.c1_woorden, "<h2>&#128308; C1 &mdash; Woorden &amp; uitdrukkingen onder de loep</h2>", "box-c1", "B2", "A2-B1")}
    <h2>&#128483;&#65039; Grammatica</h2>
    ${buildGrammar(item.grammatica)}
    <h2>&#10067; Vragen</h2>
    <div class="questions">${nl2br(item.vragen)}</div>
    <details class="answers"><summary>&#9989; Antwoorden (klik om te tonen)</summary>
      <div class="answer-body">${nl2br(item.antwoorden)}</div>
    </details>
    ${buildQuizSection(item)}`;
  window.scrollTo(0, 0);
}

// ===== Quiz =====
// Questions live inside each item in haberler.json under "quiz":
// quiz -> level (a2/b1/b2/c1) -> category (woorden/grammatica/lezen) -> [questions]
// Each question: { vraag, opties: [..], juist: indexOfCorrectOption, uitleg }
const QUIZ_LEVELS = ["a2", "b1", "b2", "c1"];
const QUIZ_CATS = { woorden: "&#128218; Woorden", grammatica: "&#128483;&#65039; Grammatica", lezen: "&#128214; Lezen" };
let quizState = { level: null, cat: null, answered: {}, score: 0 };

function buildQuizSection(item) {
  if (!item.quiz) return "";
  return `<h2>&#127891; Quiz</h2><div class="quiz-box" id="quizArea">${buildQuizInner(item)}</div>`;
}

function buildQuizInner(item) {
  const levels = QUIZ_LEVELS.filter(l => item.quiz[l]);
  if (!levels.length) return "";
  if (!levels.includes(quizState.level)) quizState.level = levels[0];
  const cats = Object.keys(QUIZ_CATS).filter(c => item.quiz[quizState.level][c]);
  if (!cats.includes(quizState.cat)) quizState.cat = cats[0];
  const questions = item.quiz[quizState.level][quizState.cat] || [];

  const levelTabs = levels.map(l =>
    `<button class="${l === quizState.level ? 'active' : ''}" onclick="setQuiz('${l}', null)">${l.toUpperCase()}</button>`).join("");
  const catTabs = cats.map(c =>
    `<button class="${c === quizState.cat ? 'active' : ''}" onclick="setQuiz('${quizState.level}','${c}')">${QUIZ_CATS[c]}</button>`).join("");

  const qHtml = questions.map((q, qi) => {
    const opts = q.opties.map((o, oi) =>
      `<button class="q-opt" id="q${qi}o${oi}" onclick="answerQuiz(${qi},${oi})">${String.fromCharCode(97 + oi)}) ${o}</button>`).join("");
    return `<div class="q-item"><div class="q-vraag">${qi + 1}. ${q.vraag}</div>${opts}
      <div class="q-uitleg" id="q${qi}u" style="display:none;"></div></div>`;
  }).join("");

  return `<div class="quiz-tabs">${levelTabs}</div>
    <div class="quiz-tabs">${catTabs}</div>
    ${qHtml}
    <div class="q-score" id="quizScore">Score: 0 / ${questions.length}</div>`;
}

// Switch level/category: reset answers and re-render only the quiz area.
function setQuiz(level, cat) {
  quizState = { level: level, cat: cat, answered: {}, score: 0 };
  document.getElementById("quizArea").innerHTML = buildQuizInner(DATA.items[currentIndex]);
}

// Handle an answer click: color the options, show explanation, update score.
function answerQuiz(qi, oi) {
  if (quizState.answered[qi] !== undefined) return; // already answered
  const item = DATA.items[currentIndex];
  const q = item.quiz[quizState.level][quizState.cat][qi];
  quizState.answered[qi] = oi;
  if (oi === q.juist) quizState.score++;

  q.opties.forEach((_, k) => {
    const btn = document.getElementById("q" + qi + "o" + k);
    btn.disabled = true;
    if (k === q.juist) btn.classList.add("correct");
    else if (k === oi) btn.classList.add("wrong");
  });
  if (q.uitleg) {
    const u = document.getElementById("q" + qi + "u");
    u.innerHTML = "&#128161; " + q.uitleg;
    u.style.display = "block";
  }
  const total = item.quiz[quizState.level][quizState.cat].length;
  document.getElementById("quizScore").textContent =
    "Score: " + quizState.score + " / " + total +
    (Object.keys(quizState.answered).length === total ? (quizState.score === total ? "  -  Perfect! 🎉" : "  -  Klaar!") : "");
}

// ===== Navigation =====
function show(index) {
  const n = DATA.items.length;
  currentIndex = ((index % n) + n) % n;
  // Reset the quiz when we move to another news item
  quizState = { level: null, cat: null, answered: {}, score: 0 };
  render();
}

document.getElementById("prevBtn").addEventListener("click", () => show(currentIndex - 1));
document.getElementById("nextBtn").addEventListener("click", () => show(currentIndex + 1));
document.getElementById("todayBtn").addEventListener("click", () => {
  document.getElementById("datePicker").valueAsDate = new Date();
  show(indexForDate(new Date()));
});
// Picking a date jumps to the item that was (or will be) shown on that day.
document.getElementById("datePicker").addEventListener("change", (e) => {
  if (e.target.value) show(indexForDate(new Date(e.target.value + "T00:00:00")));
});

// Init: set the picker to today and load everything.
document.getElementById("datePicker").valueAsDate = new Date();
loadData();
</script>
</body>
</html>
